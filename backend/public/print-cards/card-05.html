<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空耳卡片 #5 - 不要叫我瘪三不要再看我称鸡蛋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 40px;
  }

  .page-label {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  /* ─── 卡片尺寸：140×80mm（300 DPI ≈ 1654×945 px）─── */
  .card {
    width: 140mm;
    height: 80mm;
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    /* 出血保护：出血区域仅供打印店裁切，不含重要内容 */
    background: #1a1a2e;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  /* ════════════════════════════════════════
     正面
  ════════════════════════════════════════ */
  .card-front {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
  }

  /* 背景装饰光效 */
  .card-front::before {
    content: '';
    position: absolute;
    width: 60%;
    height: 100%;
    left: 0;
    top: 0;
    background:
      radial-gradient(ellipse at 0% 50%, rgba(255,105,180,0.25) 0%, transparent 55%),
      radial-gradient(ellipse at 0% 80%, rgba(0,150,255,0.2) 0%, transparent 50%);
    pointer-events: none;
  }

  /* 左侧 AI 图片区 */
  .card-image-zone {
    width: 42%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  .card-image-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* AI 图片占位符（黄色虚线边框提示） */
  .ai-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px dashed rgba(255,200,50,0.6);
    background: rgba(255,200,50,0.05);
    gap: 8px;
  }

  .ai-placeholder-icon {
    font-size: 28px;
    opacity: 0.7;
  }

  .ai-placeholder-text {
    font-size: 8px;
    color: rgba(255,200,50,0.8);
    text-align: center;
    line-height: 1.5;
    padding: 0 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  /* 右侧文字区 */
  .card-text-zone {
    width: 58%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 10mm 8mm 8mm 6mm;
    position: relative;
    z-index: 1;
  }

  .ear-lyric-label {
    font-size: 7px;
    font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .ear-lyric-text {
    font-size: 13.5mm;
    font-weight: 900;
    color: #fff;
    line-height: 1.25;
    text-shadow: 0 0 16px rgba(255,105,180,0.5), 0 2px 8px rgba(0,0,0,0.5);
    margin-bottom: auto;
    padding-top: 2mm;
    letter-spacing: 0.02em;
  }

  /* 底部信息栏 */
  .card-bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-top: 4mm;
  }

  .scan-hint {
    font-size: 7px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
    line-height: 1.6;
  }

  .qr-wrap {
    width: 18mm;
    height: 18mm;
    flex-shrink: 0;
    border-radius: 3mm;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
    background: #fff;
    padding: 1.5mm;
  }

  .qr-wrap img {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* 荧光棒装饰条 */
  .glow-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #ff69b4, #00a8e8);
    opacity: 0.8;
  }

  /* ════════════════════════════════════════
     背面
  ════════════════════════════════════════ */
  .card-back {
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #1a1a2e 0%, #0f3460 60%, #1a1a2e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8mm 10mm;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* 背景光效 */
  .card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(255,105,180,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 80%, rgba(0,150,255,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  /* 歌词金句 */
  .back-quote-mark {
    font-size: 28px;
    color: rgba(255,105,180,0.4);
    font-family: Georgia, serif;
    line-height: 1;
    margin-bottom: 2mm;
    font-style: italic;
  }

  .back-quote {
    font-size: 10.5mm;
    font-weight: 900;
    color: #fff;
    line-height: 1.4;
    text-shadow: 0 0 20px rgba(255,105,180,0.3);
    margin-bottom: 4mm;
    letter-spacing: 0.03em;
  }

  .back-source {
    font-size: 7px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: auto;
  }

  .back-song-name {
    font-size: 8px;
    font-weight: 800;
    color: rgba(0,168,232,0.9);
    letter-spacing: 0.08em;
    margin-bottom: 1mm;
  }

  .back-divider {
    width: 20mm;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,105,180,0.5), transparent);
    margin-bottom: 1mm;
  }

  .back-wmls {
    font-size: 6.5px;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .back-glow-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, #00a8e8, #ff69b4);
    opacity: 0.8;
  }

  /* 打印样式 */
  @media print {
    body {
      background: white;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .page-label {
      display: none;
    }
    .card {
      width: 146mm;   /* 含出血：140 + 3×2 */
      height: 86mm;   /* 含出血：80 + 3×2 */
      box-shadow: none;
      border-radius: 0;
      page-break-after: always;
    }
    .card:last-child {
      page-break-after: auto;
    }
  }

  @page {
    size: 146mm 86mm landscape;
    margin: 0;
  }
</style>
</head>
